spring.application.name=logistics-system

server.port=8080

#SQL server
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=Logistics;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=kosovosrbija
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

#JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=none

# Flyway owns database schema and seed migrations.
spring.sql.init.mode=never

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=dbo
spring.flyway.default-schema=dbo
spring.flyway.create-schemas=true
spring.flyway.baseline-on-migrate=false
spring.flyway.validate-on-migrate=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#CleanerConsole
spring.main.banner-mode=off
logging.level.root=WARN
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.com.zaxxer.hikari=WARN

#JWT service key
jwt.secret=${JWT_SECRET:bXlfc3VwZXJfc2VjcmV0X2tleV9mb3Jfand0X3doaWNoX2lzX2xvbmdfZW5vdWdoMTIzNDU2}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
# Central business rules
logistics.pagination.default-page-size=20
logistics.pagination.max-page-size=100
logistics.shift.max-duration-hours=8
logistics.warehouse.capacity-validation-enabled=true
logistics.status-transitions.task.NEW=IN_PROGRESS,CANCELLED
logistics.status-transitions.task.IN_PROGRESS=COMPLETED,CANCELLED
logistics.status-transitions.task.COMPLETED=
logistics.status-transitions.task.CANCELLED=
logistics.status-transitions.transport-order.DRAFT=ASSIGNED,CANCELLED
logistics.status-transitions.transport-order.CREATED=ASSIGNED,CANCELLED
logistics.status-transitions.transport-order.ASSIGNED=PICKING,CANCELLED
logistics.status-transitions.transport-order.PICKING=PACKING,CANCELLED
logistics.status-transitions.transport-order.PACKING=READY_FOR_LOADING,CANCELLED
logistics.status-transitions.transport-order.READY_FOR_LOADING=LOADING,CANCELLED
logistics.status-transitions.transport-order.LOADING=IN_TRANSIT,CANCELLED
logistics.status-transitions.transport-order.IN_TRANSIT=DELIVERED,RETURNING,FAILED
logistics.status-transitions.transport-order.RETURNING=FAILED
logistics.status-transitions.transport-order.RESCHEDULED=ASSIGNED,CANCELLED
logistics.status-transitions.transport-order.DELIVERED=
logistics.status-transitions.transport-order.FAILED=
logistics.status-transitions.transport-order.CANCELLED=
logistics.fail-protection.enabled=true
logistics.fail-protection.idempotency-ttl-seconds=30
logistics.fail-protection.write-requests-per-minute=120

logging.level.org.flywaydb=DEBUG
logging.level.org.springframework.boot.autoconfigure.flyway=DEBUG