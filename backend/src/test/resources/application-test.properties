# Test profile used by automated smoke tests.
# It does not require local SQL Server.

spring.datasource.url=jdbc:h2:mem:logistics_test;MODE=MSSQLServer;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.sql.init.mode=never
spring.flyway.enabled=false

jwt.secret=bG9naXN0aWNzLXRlc3Qtb25seS1qd3Qtc2VjcmV0LTMya2V5IQ==
jwt.expiration-ms=86400000

app.cors.allowed-origins=http://localhost:5173

logging.level.root=WARN
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.com.zaxxer.hikari=WARN
